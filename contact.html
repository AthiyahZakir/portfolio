                <li><a href="contact.html" class="active">Contact</a></li>

    <!-- Main Content -->
    <main>
        <section class="contact-header">
            <h2>Get In Touch</h2>
            <p>I'd love to hear from you! Send me a message below.</p>
        </section>

        <!-- Contact Form -->
        <section class="form-container">
            <form action="#" method="post">
                <!-- Personal Details -->
                <fieldset>
                    <legend>Your Details</legend>
                    
                    <label for="name">Name: <span>*</span></label>
                    <input type="text" id="name" name="name" required placeholder="Your name">
                    
                    <label for="email">Email: <span>*</span></label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                    
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" name="phone" placeholder="123-456-7890">
                </fieldset>

                <!-- Message -->
                <fieldset>
                    <legend>Your Message</legend>
                    
                    <label for="subject">Subject: <span>*</span></label>
                    <input type="text" id="subject" name="subject" required placeholder="What's this about?">
                    
                    <label for="message">Message: <span>*</span></label>
                    <textarea id="message" name="message" rows="6" required placeholder="Write your message here..."></textarea>
                </fieldset>

                <!-- Newsletter -->
                <fieldset>
                    <legend>Stay Connected</legend>
                    
                    <label>
                        <input type="checkbox" name="newsletter" value="yes">
                        Subscribe to newsletter
                    </label>
                    
                    <label>
                        <input type="checkbox" name="updates" value="yes">
                        Get blog updates
                    </label>
                </fieldset>

                <!-- Buttons -->
                <div class="button-group">
                    <button type="submit">Send Message</button>
                    <button type="reset">Clear</button>
                </div>
            </form>
        </section>

        <!-- Contact Info -->
        <section class="contact-info">
            <div class="info-box">
                <h3>📧 Email</h3>
                <p><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="4f2e3b2726362e27352e24263d0f28222e2623612c2022">[email&#160;protected]</a></p>
            </div>
            <div class="info-box">
                <h3>🌍 Location</h3>
                <p>Colombo, Sri Lanka</p>
            </div>
        </section>
    </main>
